<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TapMS | Cloud POS</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9402/9402314.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .active-tab { color: #2563eb; background: #eff6ff; border-radius: 20px; }
        .product-image { object-fit: cover; width: 100%; height: 100%; border-radius: 1.5rem; }
        
        /* Fixed Padding for Phone Buttons */
        main { 
            flex: 1; 
            overflow-y: auto; 
            padding-bottom: calc(220px + env(safe-area-inset-bottom)) !important; 
            -webkit-overflow-scrolling: touch; 
        }

        .tap-feedback { animation: tap-pop 0.1s ease-out; }
        @keyframes tap-pop {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .dot-connected { background: #10b981; }
        .dot-connecting { background: #fbbf24; }
        
        .order-detail { max-height: 0; opacity: 0; transition: all 0.3s ease; overflow: hidden; }
        .order-expanded .order-detail { max-height: 1000px; opacity: 1; margin-top: 1rem; }

        #summary-overlay, #backup-overlay { 
            display: none; position: fixed; inset: 0; z-index: 200; 
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px); 
            align-items: center; justify-content: center; padding: 20px; 
        }
        #summary-overlay.active, #backup-overlay.active { display: flex; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="backup-overlay">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl text-center">
            <h2 class="font-black text-xl mb-6 uppercase">Database Tools</h2>
            <div class="grid gap-4">
                <button onclick="executeExport()" class="flex items-center justify-between bg-blue-50 p-6 rounded-[1.5rem] text-blue-600 active:scale-95 transition-all">
                    <div class="flex flex-col items-start"><span class="font-black text-xs uppercase">Backup</span></div>
                    <i data-lucide="download" class="w-6 h-6"></i>
                </button>
                <button onclick="triggerImport()" class="flex items-center justify-between bg-slate-50 p-6 rounded-[1.5rem] text-slate-600 active:scale-95 transition-all">
                    <div class="flex flex-col items-start"><span class="font-black text-xs uppercase">Restore</span></div>
                    <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                </button>
            </div>
            <button onclick="closeBackupModal()" class="mt-8 text-slate-400 font-bold text-[10px] uppercase">Cancel</button>
        </div>
    </div>

    <div id="summary-overlay">
        <div class="bg-white w-full max-w-sm rounded-[3.5rem] p-10 text-center shadow-2xl">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="check-circle" class="w-10 h-10"></i></div>
            <h2 class="font-black text-2xl mb-1 uppercase">Order Sent</h2>
            <p id="sum-id" class="text-slate-400 font-bold text-[10px] mb-8 uppercase">#000</p>
            <div id="sum-details" class="bg-slate-50 rounded-[2.5rem] p-6 mb-8 border text-left space-y-3 max-h-48 overflow-y-auto"></div>
            <div class="flex justify-between items-center mb-10 px-4">
                <span class="font-bold text-slate-400 text-[10px] uppercase">Total</span>
                <h3 id="sum-total" class="text-4xl font-black text-blue-600">$0.00</h3>
            </div>
            <button onclick="closeSummary()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase text-[10px]">Continue</button>
        </div>
    </div>

    <nav class="glass border-b px-6 py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-3 h-3 rounded-full dot-connecting"></div>
            <h1 class="font-extrabold text-xl tracking-tight cursor-pointer" onclick="instantWipe()">TapMS</h1>
        </div>
        <div class="flex items-center gap-2">
             <button onclick="toggleSearch()" class="p-2.5 bg-slate-100 rounded-2xl"><i data-lucide="search" class="w-6 h-6 text-slate-500"></i></button>
             <button onclick="checkoutToQueue()" class="relative p-2.5 bg-blue-600 rounded-2xl shadow-md">
                <i data-lucide="send" class="w-6 h-6 text-white"></i>
                <div id="cart-count-top" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</div>
             </button>
        </div>
    </nav>

    <div id="cat-bar" class="glass border-b px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar shrink-0"></div>

    <div id="search-container" class="hidden glass border-b px-6 py-3 transition-all">
        <input type="text" id="cashier-search" placeholder="Search..." oninput="filterProducts(this.value)" class="w-full bg-slate-100 px-4 py-3 rounded-2xl font-bold text-sm outline-none">
    </div>

    <main class="p-4">
        <div id="view-cashier" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4"></div>
        
        <div id="view-manage" class="hidden max-w-4xl mx-auto space-y-6">
            <div class="flex bg-slate-100 p-1.5 rounded-2xl w-fit mx-auto mb-8">
                <button id="sub-btn-orders" onclick="toggleManageSection('orders')" class="px-6 py-2 rounded-xl text-xs font-black uppercase bg-white shadow-sm text-blue-600">Orders</button>
                <button id="sub-btn-stock" onclick="toggleManageSection('stock')" class="px-6 py-2 rounded-xl text-xs font-black uppercase text-slate-400">Stock</button>
            </div>

            <div id="sec-orders" class="space-y-4">
                <div id="pending-list" class="space-y-4"></div>
                <div id="history-list" class="space-y-4 mt-8"></div>
            </div>

            <div id="sec-stock" class="hidden space-y-6">
                <button onclick="openBackupModal()" class="w-full flex items-center justify-center gap-2 bg-white border py-4 rounded-2xl text-[10px] font-black uppercase">
                    <i data-lucide="database" class="w-4 h-4"></i> Manage Database
                </button>
                <input type="file" id="db-import-input" class="hidden" accept=".json" onchange="importDatabase(event)">
                
                <div class="flex gap-3">
                    <button onclick="toggleSummary()" id="summary-toggle-ui" class="bg-white px-4 py-4 rounded-2xl border flex-1 text-[10px] font-black uppercase">Summary: OFF</button>
                    <button onclick="addItem()" class="bg-slate-900 text-white px-6 py-4 rounded-2xl text-[10px] font-black uppercase flex-1">+ Add Item</button>
                </div>
                <datalist id="category-options"></datalist>
                <div id="inventory-list" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <nav class="glass border-t px-6 py-4 flex justify-around shrink-0 z-50 pb-8">
        <button id="btn-cashier" onclick="showView('cashier')" class="flex flex-col items-center gap-2 p-3 active-tab transition-all">
            <i data-lucide="shopping-cart" class="w-7 h-7"></i>
            <span class="text-[10px] font-black uppercase">Cart</span>
        </button>
        <button id="btn-manage" onclick="showView('manage')" class="relative flex flex-col items-center gap-2 p-3 text-slate-400 transition-all">
            <i data-lucide="clipboard-list" class="w-7 h-7"></i>
            <div id="nav-badge" class="hidden absolute top-2 right-4 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></div>
            <span class="text-[10px] font-black uppercase">Manage</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
