<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TapMS | Cloud POS</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9402/9402314.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .active-tab { color: #2563eb; background: #eff6ff; border-radius: 20px; }
        .product-image { object-fit: cover; width: 100%; height: 100%; border-radius: 1.5rem; }
        
        /* Mobile Optimization: Note 20 Ultra / Victus Scroll Buffer */
        main { flex: 1; overflow-y: auto; padding-bottom: 280px !important; -webkit-overflow-scrolling: touch; }

        @keyframes tap-pop {
            0% { transform: scale(1); }
            30% { transform: scale(0.92); filter: brightness(0.85); }
            100% { transform: scale(1); }
        }
        .tap-feedback { animation: tap-pop 0.2s ease-out; }

        .dot-connected { background: #10b981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.6); }
        .dot-connecting { background: #fbbf24; box-shadow: 0 0 8px rgba(251, 191, 36, 0.6); }
        
        .order-detail { max-height: 0; opacity: 0; transition: all 0.3s ease-in-out; overflow: hidden; }
        .order-expanded .order-detail { max-height: 500px; opacity: 1; margin-top: 1rem; }

        #summary-overlay, #backup-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        #summary-overlay.active, #backup-overlay.active { display: flex; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="backup-overlay">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl text-center">
            <h2 class="font-black text-xl mb-6 uppercase tracking-tight">Database Tools</h2>
            <div class="grid gap-4">
                <button onclick="executeExport()" class="flex items-center justify-between bg-blue-50 p-5 rounded-2xl text-blue-600 active:scale-95 transition-all">
                    <span class="font-bold text-sm uppercase">Make Backup</span>
                    <i data-lucide="download" class="w-5 h-5"></i>
                </button>
                <button onclick="triggerImport()" class="flex items-center justify-between bg-slate-50 p-5 rounded-2xl text-slate-600 active:scale-95 transition-all">
                    <span class="font-bold text-sm uppercase">Restore File</span>
                    <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                </button>
            </div>
            <button onclick="closeBackupModal()" class="mt-6 text-slate-400 font-bold text-[10px] uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <div id="summary-overlay">
        <div class="bg-white w-full max-w-sm rounded-[3.5rem] p-10 text-center shadow-2xl">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="check-circle" class="w-10 h-10"></i></div>
            <h2 class="font-black text-2xl mb-1 text-slate-900 uppercase">Order Sent</h2>
            <p id="sum-id" class="text-slate-400 font-bold text-[10px] mb-8 uppercase tracking-widest">#000</p>
            <div id="sum-details" class="bg-slate-50 rounded-[2.5rem] p-6 mb-8 border border-slate-100 text-left space-y-3 max-h-48 overflow-y-auto"></div>
            <div class="flex justify-between items-center mb-10 px-4">
                <span class="font-bold text-slate-400 text-[10px] uppercase tracking-widest">Total</span>
                <h3 id="sum-total" class="text-4xl font-black text-blue-600">$0.00</h3>
            </div>
            <button onclick="closeSummary()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Continue</button>
        </div>
    </div>

    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-3 h-3 rounded-full dot-connecting animate-pulse"></div>
            <div class="bg-blue-600 p-2 rounded-2xl shadow-lg"><i data-lucide="layout-grid" class="w-5 h-5 text-white"></i></div>
            <h1 class="font-extrabold text-xl tracking-tight select-none cursor-pointer" onclick="confirmWipe()">TapMS</h1>
        </div>
        <div class="flex items-center gap-2">
             <button onclick="toggleSearch()" class="p-2.5 bg-slate-100 rounded-2xl active:scale-90 transition-all"><i data-lucide="search" class="w-6 h-6 text-slate-500"></i></button>
             <button onclick="checkoutToQueue()" class="relative p-2.5 bg-blue-600 rounded-2xl active:scale-95 shadow-md">
                <i data-lucide="send" class="w-6 h-6 text-white"></i>
                <div id="cart-count-top" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</div>
             </button>
        </div>
    </nav>

    <div id="cat-bar" class="glass border-b border-slate-100 px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar shrink-0"></div>

    <div id="search-container" class="hidden glass border-b border-slate-200 px-6 py-3 transition-all">
        <div class="relative flex items-center">
            <i data-lucide="search" class="absolute left-4 w-4 h-4 text-slate-400"></i>
            <input type="text" id="cashier-search" placeholder="Search products..." oninput="filterProducts(this.value)" class="w-full bg-slate-100 pl-11 pr-4 py-3 rounded-2xl font-bold text-sm outline-none">
        </div>
    </div>

    <main class="p-4 md:p-6">
        <div id="view-cashier" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-5"></div>
        
        <div id="view-manage" class="hidden max-w-4xl mx-auto space-y-6">
            <div class="flex bg-slate-100 p-1.5 rounded-2xl w-fit mx-auto mb-8">
                <button id="sub-btn-orders" onclick="toggleManageSection('orders')" class="px-6 py-2 rounded-xl text-xs font-black uppercase bg-white shadow-sm text-blue-600">Orders</button>
                <button id="sub-btn-stock" onclick="toggleManageSection('stock')" class="px-6 py-2 rounded-xl text-xs font-black uppercase text-slate-400">Stock</button>
            </div>

            <div id="sec-orders" class="space-y-4">
                <div id="pending-list" class="space-y-4"></div>
                <div id="history-list" class="space-y-4 mt-8 border-t pt-8"></div>
            </div>

            <div id="sec-stock" class="hidden space-y-6">
                <button onclick="openBackupModal()" class="w-full flex items-center justify-center gap-2 bg-white border border-slate-200 py-4 rounded-2xl text-[10px] font-black uppercase text-slate-600 shadow-sm active:scale-95 transition-all">
                    <i data-lucide="database" class="w-4 h-4"></i> Manage Database
                </button>
                <input type="file" id="db-import-input" class="hidden" accept=".json" onchange="importDatabase(event)">

                <div class="flex items-center justify-between gap-3 px-2">
                    <button onclick="toggleSummary()" id="summary-toggle-ui" class="flex items-center gap-3 bg-white px-4 py-4 rounded-2xl border border-slate-200 shadow-sm flex-1">
                        <div id="toggle-dot" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
                        <span class="text-[10px] font-black uppercase text-slate-500">Summary: OFF</span>
                    </button>
                    <button onclick="addItem()" class="bg-slate-900 text-white px-6 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg flex-1">+ Add Item</button>
                </div>
                
                <datalist id="category-list"></datalist>
                <div id="inventory-list" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <nav class="glass border-t border-slate-200 px-6 pt-4 pb-12 flex justify-around shrink-0 z-50">
        <button id="btn-cashier" onclick="showView('cashier')" class="flex flex-col items-center gap-2 p-3 active-tab transition-all">
            <i data-lucide="shopping-cart" class="w-7 h-7"></i>
            <span class="text-[10px] font-black uppercase tracking-widest">Cashier</span>
        </button>
        <button id="btn-manage" onclick="showView('manage')" class="relative flex flex-col items-center gap-2 p-3 text-slate-400 transition-all">
            <div class="relative">
                <i data-lucide="clipboard-list" class="w-7 h-7"></i>
                <div id="nav-badge" class="hidden absolute -top-1 -right-1 w-3.5 h-3.5 bg-red-500 rounded-full border-2 border-white animate-pulse"></div>
            </div>
            <span class="text-[10px] font-black uppercase tracking-widest">Manage</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
