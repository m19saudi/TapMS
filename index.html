<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TapMS | Cloud POS</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9402/9402314.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); }
        .active-tab { color: #2563eb; background: #eff6ff; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E293B] h-screen flex flex-col overflow-hidden">

    <nav class="px-8 py-6 flex justify-between items-center z-50 shrink-0">
        <div id="status-dot" class="w-3 h-3 bg-slate-300 rounded-full transition-all duration-500"></div>

        <div id="nav-center" class="hidden flex bg-slate-100/80 p-1 rounded-2xl border border-slate-200/50">
            <button onclick="toggleManageSection('orders')" id="sub-btn-orders" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all bg-white shadow-sm text-blue-600">Orders</button>
            <button onclick="toggleManageSection('stock')" id="sub-btn-stock" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all text-slate-400">Product Master</button>
        </div>

        <div class="flex items-center gap-4">
            <button class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-xl text-slate-500"><i data-lucide="scan-line" class="w-5 h-5"></i></button>
            <button class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-xl text-slate-500 relative">
                <i data-lucide="bell" class="w-5 h-5"></i>
                <div class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></div>
            </button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden px-8">
        <main class="flex-1 overflow-y-auto pb-40 custom-scroll">
            <div id="view-cashier" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            
            <div id="view-manage" class="hidden max-w-5xl mx-auto">
                <div id="sec-orders" class="space-y-8 mt-4">
                    <h2 class="text-2xl font-black">Pending Review</h2>
                    <div id="pending-list" class="grid gap-4"></div>
                    <h2 class="text-2xl font-black pt-4">Approved History</h2>
                    <div id="history-list" class="grid gap-4"></div>
                </div>

                <div id="sec-stock" class="hidden space-y-6 mt-4">
                    <div class="flex justify-between items-center">
                        <h2 class="text-2xl font-black">Stock Inventory</h2>
                        <button onclick="addItem()" class="bg-[#0F172A] text-white px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest">+ New Item</button>
                    </div>
                    <div id="inventory-list" class="space-y-3"></div>
                </div>
            </div>
        </main>

        <aside class="hidden xl:flex w-[400px] flex-col ml-8 border-l border-slate-200 pl-8 pb-10">
            <h2 class="font-black text-2xl mb-10">Current Order</h2>
            <div id="sidebar-items" class="flex-1 overflow-y-auto space-y-4 custom-scroll pr-4"></div>
            <div class="pt-8 border-t border-slate-200 mt-8">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Total Amount</span>
                    <span id="side-total" class="text-4xl font-black text-blue-600">$0.00</span>
                </div>
                <button onclick="checkoutToQueue()" class="w-full py-6 bg-[#0F172A] text-white rounded-3xl font-black text-lg shadow-2xl active:scale-95 transition-all">CHECKOUT</button>
            </div>
        </aside>
    </div>

    <nav class="glass border-t border-slate-200 px-10 py-4 pb-10 flex justify-around shrink-0 z-50">
        <button onclick="showView('cashier'); document.getElementById('nav-center').classList.add('hidden')" id="btn-cashier" class="flex flex-col items-center gap-1 p-3 active-tab">
            <i data-lucide="shopping-basket" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Orders</span>
        </button>
        <button onclick="showView('manage'); document.getElementById('nav-center').classList.remove('hidden')" id="btn-manage" class="flex flex-col items-center gap-1 p-3 text-slate-400">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Master</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
