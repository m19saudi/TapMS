<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TapMS | Cloud POS</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9402/9402314.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .active-tab { color: #2563eb; background: #eff6ff; border-radius: 20px; }
        .product-image { object-fit: cover; width: 100%; height: 100%; border-radius: 1.5rem; transition: transform 0.3s; }
        .card-active { transform: scale(0.95); opacity: 0.8; }
        
        main { padding-bottom: 420px; }
        @media (min-width: 1024px) {
            main { padding-bottom: 120px; padding-left: 8%; padding-right: 8%; }
            #view-cashier { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 2rem; }
        }

        #summary-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        #summary-overlay.active { display: flex; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tag-active { background: #2563eb; color: white; shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .badge { position: absolute; top: 0; right: -5px; background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 99px; border: 2px solid white; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="summary-overlay">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center shadow-2xl overflow-hidden">
            <div class="w-16 h-16 bg-green-50 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check" class="w-8 h-8"></i>
            </div>
            <h2 class="font-black text-xl text-slate-900">Order Sent</h2>
            <p id="sum-id" class="text-slate-400 font-bold text-[10px] mb-4 uppercase tracking-widest">#000</p>
            
            <div class="bg-slate-50 rounded-3xl p-4 mb-6 max-h-40 overflow-y-auto border border-slate-100" id="sum-details"></div>
            
            <div class="flex justify-between items-center mb-6 px-2">
                <span class="font-bold text-slate-400 text-xs">Total Amount</span>
                <h3 id="sum-total" class="text-3xl font-black text-blue-600">$0.00</h3>
            </div>
            <button onclick="closeSummary()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all">Continue</button>
        </div>
    </div>

    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
            <h1 class="font-black text-xl tracking-tighter select-none cursor-pointer" onclick="triggerReset()">TapMS</h1>
        </div>
        
        <div class="flex-1 max-w-xs mx-4">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                <input type="text" id="search-input" oninput="doSearch(this.value)" placeholder="Search products..." class="w-full bg-slate-100 border-none rounded-xl py-2 pl-10 text-xs font-bold focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <button onclick="checkoutToQueue()" class="relative bg-blue-600 p-2.5 rounded-xl shadow-lg active:scale-90 transition-all">
            <i data-lucide="send" class="w-5 h-5 text-white"></i>
            <span id="cart-count" class="hidden badge">0</span>
        </button>
    </nav>

    <div id="category-bar" class="glass border-b border-slate-200 px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar"></div>

    <main class="flex-1 overflow-y-auto p-4">
        <div id="view-cashier" class="grid grid-cols-2 gap-4"></div>
        
        <div id="view-manage" class="hidden max-w-4xl mx-auto space-y-8">
            <div class="flex bg-slate-200/50 p-1 rounded-2xl w-fit mx-auto">
                <button id="sub-btn-orders" onclick="toggleManageSection('orders')" class="relative px-8 py-2.5 rounded-xl text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm">
                    Orders <span id="order-notif" class="hidden w-2 h-2 bg-red-500 rounded-full absolute top-2 right-4"></span>
                </button>
                <button id="sub-btn-stock" onclick="toggleManageSection('stock')" class="px-8 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-500">Stock</button>
            </div>

            <div id="sec-orders" class="space-y-4 pb-20">
                <div id="pending-list" class="space-y-3"></div>
                <div id="history-list" class="pt-8 border-t border-slate-200 space-y-3"></div>
            </div>

            <div id="sec-stock" class="hidden space-y-6 pb-20">
                <div class="flex justify-between items-center px-2">
                    <h2 class="font-black text-2xl tracking-tight text-slate-900">Inventory</h2>
                    <button onclick="toggleSummarySetting()" id="summary-toggle-ui" class="flex items-center gap-2 bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                        <div id="toggle-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                        <span class="text-[9px] font-black uppercase text-slate-500">Summary: OFF</span>
                    </button>
                    <button onclick="addItem()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">+ Add</button>
                </div>
                <div id="inventory-list" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-slate-200 px-10 py-5 pb-10 flex justify-around z-50">
        <button id="btn-cashier" onclick="showView('cashier')" class="flex flex-col items-center gap-1 active-tab p-4 transition-all">
            <i data-lucide="layout-grid" class="w-7 h-7"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">POS</span>
        </button>
        <button id="btn-manage" onclick="showView('manage')" class="relative flex flex-col items-center gap-1 text-slate-400 p-4 transition-all">
            <i data-lucide="settings" class="w-7 h-7"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">Manage</span>
            <span id="manage-notif" class="hidden w-2.5 h-2.5 bg-red-500 rounded-full absolute top-4 right-6 border-2 border-white"></span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
