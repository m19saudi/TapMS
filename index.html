<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TapMS | Cloud POS</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9402/9402314.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); }
        .active-tab { color: #2563eb; background: #eff6ff; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .product-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">

    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div onclick="manualLoginTrigger()" class="bg-blue-600 p-2.5 rounded-2xl shadow-lg cursor-pointer active:scale-90 transition-all">
                <i data-lucide="cloud-lightning" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="font-extrabold text-xl tracking-tight">TapMS</h1>
        </div>
        <div id="sync-status" class="text-[10px] font-black uppercase text-slate-400 flex items-center gap-1.5 bg-white px-3 py-1.5 rounded-full border border-slate-100 shadow-sm">
            <div id="status-dot" class="w-2 h-2 bg-slate-300 rounded-full"></div> 
            <span id="status-text">Disconnected</span>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 overflow-y-auto p-6 pb-40 custom-scroll">
            <div id="view-cashier" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
            
            <div id="view-manage" class="hidden max-w-4xl mx-auto space-y-6">
                <div class="flex bg-slate-200/50 p-1.5 rounded-2xl w-fit mx-auto mb-8">
                    <button onclick="toggleManageSection('orders')" id="sub-btn-orders" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all bg-white shadow-sm text-blue-600">Queue</button>
                    <button onclick="toggleManageSection('stock')" id="sub-btn-stock" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all text-slate-400">Inventory</button>
                </div>
                <div id="sec-orders" class="space-y-6">
                    <div id="pending-list" class="grid gap-4"></div>
                    <hr class="border-slate-200">
                    <div id="history-list" class="grid gap-4"></div>
                </div>
                <div id="sec-stock" class="hidden space-y-4">
                    <div id="inventory-list" class="space-y-2"></div>
                </div>
            </div>
        </main>

        <aside class="hidden xl:flex w-96 glass border-l border-slate-200 flex-col p-8">
            <div class="font-black text-2xl mb-6">Current Order</div>
            <div id="sidebar-items" class="flex-1 overflow-y-auto space-y-4 custom-scroll pr-2"></div>
            <div class="pt-6 border-t border-slate-200 mt-6">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Total</span>
                    <span id="side-total" class="text-3xl font-black text-blue-600">$0.00</span>
                </div>
                <button onclick="checkoutToQueue()" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-lg active:scale-95 transition-all shadow-xl">CHECKOUT</button>
            </div>
        </aside>
    </div>

    <nav class="glass border-t border-slate-200 px-10 py-4 pb-8 flex justify-around shrink-0 z-50">
        <button onclick="showView('cashier')" id="btn-cashier" class="flex flex-col items-center gap-1 p-3 active-tab">
            <i data-lucide="shopping-basket" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Cashier</span>
        </button>
        <button onclick="showView('manage')" id="btn-manage" class="flex flex-col items-center gap-1 p-3 text-slate-400">
            <i data-lucide="clipboard-list" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Manage</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
