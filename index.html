<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TapMS | Cloud POS</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9402/9402314.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .active-tab { color: #2563eb; background: #eff6ff; border-radius: 20px; }
        .product-image { object-fit: cover; width: 100%; height: 100%; border-radius: 1.5rem; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        #reader { border-radius: 24px; overflow: hidden; }
        .notif-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        /* Mobile Cart Drawer Logic */
        @media (max-width: 1280px) {
            #order-sidebar {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                height: 80vh;
                transform: translateY(110%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 100;
                border-radius: 3rem 3rem 0 0;
                border-top: 1px solid #e2e8f0;
                box-shadow: 0 -20px 25px -5px rgb(0 0 0 / 0.1);
            }
            #order-sidebar.open { transform: translateY(0); }
            .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 90; backdrop-filter: blur(4px); }
            .mobile-overlay.active { display: block; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col">
    <div id="overlay" class="mobile-overlay" onclick="toggleMobileCart()"></div>

    <nav class="glass border-b border-slate-200 px-4 md:px-6 py-4 flex justify-between items-center z-[60] shrink-0">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2.5 h-2.5 bg-red-500 rounded-full"></div>
            <div class="bg-blue-600 p-2 rounded-2xl shadow-lg">
                <i data-lucide="layout-grid" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="font-extrabold text-xl tracking-tight">TapMS</h1>
        </div>
        <div class="flex items-center gap-2">
             <button onclick="openScanner(null)" class="p-2.5 bg-slate-100 rounded-2xl active:scale-90 transition-all">
                <i data-lucide="scan-barcode" class="w-6 h-6 text-slate-500"></i>
             </button>
             <button onclick="toggleMobileCart()" class="xl:hidden relative p-2.5 bg-blue-600 rounded-2xl active:scale-90 transition-all">
                <i data-lucide="shopping-cart" class="w-6 h-6 text-white"></i>
                <div id="cart-count-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</div>
             </button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden relative">
        <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-32 custom-scroll">
            <div id="view-cashier" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>

            <div id="view-manage" class="hidden max-w-4xl mx-auto space-y-6">
                <div class="flex bg-slate-100 p-1.5 rounded-2xl w-fit mx-auto mb-8">
                    <button id="sub-btn-orders" onclick="toggleManageSection('orders')" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all bg-white shadow-sm text-blue-600">Orders</button>
                    <button id="sub-btn-stock" onclick="toggleManageSection('stock')" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all text-slate-400">Product Master</button>
                </div>
                
                <div id="sec-orders" class="space-y-6">
                    <h2 class="font-black text-xl md:text-2xl px-2">Pending Review</h2>
                    <div id="pending-list" class="grid gap-4"></div>
                    <hr class="border-slate-200 my-6">
                    <h2 class="font-black text-xl md:text-2xl px-2 text-slate-400">Approved History</h2>
                    <div id="history-list" class="grid gap-4"></div>
                </div>

                <div id="sec-stock" class="hidden space-y-6">
                    <div class="flex justify-between items-center px-2">
                        <h2 class="font-black text-xl md:text-2xl">Stock Inventory</h2>
                        <button onclick="addItem()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg">+ New Item</button>
                    </div>
                    <div id="inventory-list" class="grid gap-3"></div>
                </div>
            </div>
        </main>

        <aside id="order-sidebar" class="xl:flex w-full xl:w-96 glass border-l border-slate-200 flex-col p-6 md:p-8">
            <div class="flex justify-between items-center mb-6">
                <div class="font-black text-2xl">Current Order</div>
                <button onclick="toggleMobileCart()" class="xl:hidden p-2 bg-slate-100 rounded-full"><i data-lucide="chevron-down"></i></button>
            </div>
            <div id="sidebar-items" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scroll"></div>
            <div class="pt-6 border-t border-slate-200 mt-6">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Total Amount</span>
                    <span id="side-total" class="text-3xl font-black text-blue-600">$0.00</span>
                </div>
                <button onclick="checkoutToQueue()" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-lg active:scale-95 transition-all uppercase shadow-xl">Checkout</button>
            </div>
        </aside>
    </div>

    <div id="scan-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] w-full max-w-sm shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black">Scanner</h3>
                <button onclick="closeScanner()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div id="reader"></div>
        </div>
    </div>

    <nav class="glass border-t border-slate-200 px-6 md:px-10 py-3 pb-8 flex justify-around shrink-0 z-50">
        <button id="btn-cashier" onclick="showView('cashier')" class="flex flex-col items-center gap-1 p-3 active-tab">
            <i data-lucide="shopping-basket" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Cashier</span>
        </button>
        <button id="btn-manage" onclick="showView('manage')" class="relative flex flex-col items-center gap-1 p-3 text-slate-400">
            <div class="relative inline-flex flex-col items-center">
                <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                <div id="nav-badge" class="hidden absolute top-[-3px] right-[-5px] w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white notif-pulse"></div>
            </div>
            <span class="text-[10px] font-bold uppercase">Manage</span>
        </button>
    </nav>

    <script src="script.js"></script>
    <script>
        function toggleMobileCart() {
            const sidebar = document.getElementById('order-sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }
    </script>
</body>
</html>
