<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TapMS | Cloud POS</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9402/9402314.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); }
        .active-tab { color: #2563eb; background: #eff6ff; border-radius: 20px; }
        .product-image { object-fit: cover; width: 100%; height: 100%; border-radius: 1.5rem; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        #reader { border-radius: 24px; overflow: hidden; }
        .notif-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        #status-dot { transition: all 0.5s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">
    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full mr-1"></div>
            <div class="bg-blue-600 p-2 rounded-2xl shadow-lg">
                <i data-lucide="layout-grid" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="font-extrabold text-xl tracking-tight">TapMS</h1>
        </div>
        <div class="flex items-center gap-2">
             <button onclick="openScanner(null)" class="p-2.5 bg-slate-100 rounded-2xl active:scale-90 transition-all">
                <i data-lucide="scan-barcode" class="w-6 h-6 text-slate-500"></i>
             </button>
             <button onclick="showView('manage')" class="relative p-2.5 bg-white border border-slate-100 rounded-2xl active:scale-90 transition-all">
                <i data-lucide="bell" class="w-6 h-6 text-slate-400"></i>
                <div id="notif-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white notif-pulse">0</div>
             </button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 overflow-y-auto p-6 pb-40 custom-scroll">
            <div id="view-cashier" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
            <div id="view-manage" class="hidden max-w-4xl mx-auto space-y-6">
                <div class="flex bg-slate-100 p-1.5 rounded-2xl w-fit mx-auto mb-8">
                    <button id="sub-btn-orders" onclick="toggleManageSection('orders')" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all bg-white shadow-sm text-blue-600">Orders</button>
                    <button id="sub-btn-stock" onclick="toggleManageSection('stock')" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all text-slate-400">Product Master</button>
                </div>
                <div id="sec-orders" class="space-y-8">
                    <section class="space-y-4">
                        <h2 class="font-black text-2xl px-2">Pending Review</h2>
                        <div id="pending-list" class="space-y-4"></div>
                    </section>
                    <hr class="border-slate-200">
                    <section class="space-y-4">
                        <h2 class="font-black text-2xl px-2 text-slate-400">Approved History</h2>
                        <div id="history-list" class="space-y-4"></div>
                    </section>
                </div>
                <div id="sec-stock" class="hidden space-y-6">
                    <div class="flex justify-between items-center px-2">
                        <h2 class="font-black text-2xl">Stock Inventory</h2>
                        <button onclick="addItem()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg">+ New Item</button>
                    </div>
                    <div id="inventory-list" class="space-y-3"></div>
                </div>
            </div>
        </main>
        <aside class="hidden xl:flex w-96 glass border-l border-slate-200 flex-col p-8">
            <div class="font-black text-2xl mb-6">Current Order</div>
            <div id="sidebar-items" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scroll"></div>
            <div class="pt-6 border-t border-slate-200 mt-6">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">Total Amount</span>
                    <span id="side-total" class="text-3xl font-black text-blue-600">$0.00</span>
                </div>
                <button onclick="checkoutToQueue()" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black text-lg active:scale-95 transition-all uppercase shadow-xl">Checkout</button>
            </div>
        </aside>
    </div>

    <div id="scan-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[3rem] w-full max-w-sm shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black">Scanner</h3>
                <button onclick="closeScanner()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div id="reader"></div>
        </div>
    </div>

    <nav class="glass border-t border-slate-200 px-10 py-4 pb-8 flex justify-around shrink-0 z-50">
        <button id="btn-cashier" onclick="showView('cashier')" class="flex flex-col items-center gap-1 p-3 active-tab">
            <i data-lucide="shopping-basket" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Cashier</span>
        </button>
        <button id="btn-manage" onclick="showView('manage')" class="relative flex flex-col items-center gap-1 p-3 text-slate-400">
            <div class="relative inline-flex flex-col items-center">
                <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                <div id="nav-badge" class="hidden absolute top-[-3px] right-[-5px] w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white notif-pulse"></div>
            </div>
            <span class="text-[10px] font-bold uppercase">Manage</span>
        </button>
    </nav>
    <script src="script.js"></script>
</body>
</html>
