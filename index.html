<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TapMS | Cloud POS</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9402/9402314.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); }
        .active-tab { color: #2563eb; background: #eff6ff; border-radius: 20px; }
        .product-image { object-fit: cover; width: 100%; height: 100%; border-radius: 1.5rem; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">

    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-2xl shadow-lg"><i data-lucide="cloud-lightning" class="w-5 h-5 text-white"></i></div>
            <h1 class="font-extrabold text-xl tracking-tight">TapMS</h1>
        </div>
        <div id="sync-status" class="text-[10px] font-black uppercase text-emerald-500 flex items-center gap-1">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div> Live Sync
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 overflow-y-auto p-6 pb-40 custom-scroll">
            <div id="view-cashier" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
            
            <div id="view-manage" class="hidden max-w-4xl mx-auto space-y-6">
                <div class="flex bg-slate-100 p-1.5 rounded-2xl w-fit mx-auto mb-8">
                    <button onclick="toggleManageSection('orders')" id="sub-btn-orders" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all bg-white shadow-sm text-blue-600">Orders</button>
                    <button onclick="toggleManageSection('stock')" id="sub-btn-stock" class="px-6 py-2 rounded-xl text-xs font-black uppercase transition-all text-slate-400">Stock</button>
                </div>
                <div id="sec-orders" class="space-y-8">
                    <div id="pending-list" class="space-y-4"></div>
                    <hr class="border-slate-200">
                    <div id="history-list" class="space-y-4"></div>
                </div>
                <div id="sec-stock" class="hidden space-y-4">
                    <div class="flex justify-between items-center"><h2 class="font-black text-2xl">Inventory</h2><button onclick="addItem()" class="bg-black text-white px-4 py-2 rounded-xl text-xs">+ New</button></div>
                    <div id="inventory-list" class="space-y-2"></div>
                </div>
            </div>
        </main>

        <aside class="hidden xl:flex w-96 glass border-l border-slate-200 flex-col p-8">
            <div class="font-black text-2xl mb-6">Current Order</div>
            <div id="sidebar-items" class="flex-1 overflow-y-auto space-y-4 custom-scroll"></div>
            <div class="pt-6 border-t border-slate-200 mt-6">
                <div id="side-total" class="text-3xl font-black text-blue-600 mb-6">$0.00</div>
                <button onclick="checkoutToQueue()" class="w-full py-5 bg-slate-900 text-white rounded-3xl font-black shadow-xl uppercase">Checkout</button>
            </div>
        </aside>
    </div>

    <nav class="glass border-t border-slate-200 px-10 py-4 pb-8 flex justify-around shrink-0 z-50">
        <button onclick="showView('cashier')" id="btn-cashier" class="flex flex-col items-center gap-1 p-3 active-tab">
            <i data-lucide="shopping-basket" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Cashier</span>
        </button>
        <button onclick="showView('manage')" id="btn-manage" class="flex flex-col items-center gap-1 p-3 text-slate-400">
            <i data-lucide="clipboard-list" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Manage</span>
        </button>
    </nav>

    <script>
        // --- UI RENDERING LOGIC ---
        function render() {
            // Update Cart UI
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('side-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('sidebar-items').innerHTML = cart.map((i, idx) => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div class="flex items-center gap-3">
                        <img src="${i.img}" class="w-10 h-10 rounded-xl object-cover">
                        <div><p class="font-bold text-sm">${i.name}</p><p class="text-[10px] text-slate-400">Qty: ${i.qty}</p></div>
                    </div>
                    <button onclick="cart.splice(${idx},1); render();" class="text-slate-300"><i data-lucide="x-circle" class="w-5 h-5"></i></button>
                </div>
            `).join('') || '<div class="text-center py-24 opacity-20 font-black italic">Empty</div>';

            // Cashier Products
            document.getElementById('view-cashier').innerHTML = products.sort((a,b) => b.fav - a.fav).map(p => `
                <div class="bg-white p-4 rounded-[2.5rem] border border-slate-100 shadow-sm cursor-pointer" onclick="addToCart(${p.id})">
                    <div class="aspect-square mb-4 relative overflow-hidden rounded-[1.8rem] bg-slate-50">
                        <img src="${p.img}" class="product-image">
                    </div>
                    <h3 class="font-bold text-center text-sm truncate px-2">${p.name}</h3>
                    <p class="text-blue-600 font-black text-center text-xs">$${p.price.toFixed(2)}</p>
                </div>
            `).join('');

            // Pending Orders
            document.getElementById('pending-list').innerHTML = queue.map((ord, idx) => `
                <div class="bg-blue-50/50 p-5 rounded-[2rem] border-2 border-blue-200">
                    <div class="flex justify-between items-center mb-2 gap-3">
                        <div class="flex items-center bg-white px-3 py-2 rounded-xl border border-blue-100 flex-1">
                            <span class="text-blue-600 font-black text-xs mr-2">#${ord.orderNum}</span>
                            <input type="text" value="${ord.desc || ''}" placeholder="Tag/Name..." onchange="updateTag(${idx}, this.value)" class="bg-transparent font-bold text-blue-600 text-sm w-full outline-none">
                        </div>
                        <p class="font-black text-xl text-blue-600">$${ord.total.toFixed(2)}</p>
                    </div>
                    <button onclick="approveOrder(${idx})" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-2xl text-[10px] font-black uppercase">Approve</button>
                </div>
            `).join('') || '<p class="text-center py-10 text-slate-300 font-bold italic">No pending orders</p>';

            // Inventory List
            document.getElementById('inventory-list').innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-3xl border border-slate-100 flex items-center gap-4">
                    <input type="text" value="${p.name}" onchange="editItem(${p.id}, 'name', this.value)" class="flex-1 font-bold text-sm bg-slate-50 p-2 rounded-xl outline-none">
                    <input type="number" value="${p.price}" onchange="editItem(${p.id}, 'price', this.value)" class="w-20 bg-slate-50 p-2 rounded-xl outline-none font-black text-sm text-blue-600">
                    <button onclick="removeItem(${p.id})" class="text-red-300"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');

            lucide.createIcons();
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const entry = cart.find(i => i.id === id);
            if (entry) entry.qty++; else cart.push({...p, qty: 1});
            render();
        }

        function showView(v) {
            document.getElementById('view-cashier').classList.toggle('hidden', v !== 'cashier');
            document.getElementById('view-manage').classList.toggle('hidden', v !== 'manage');
            document.getElementById('btn-cashier').className = (v==='cashier')?'flex flex-col items-center gap-1 p-3 active-tab':'flex flex-col items-center gap-1 p-3 text-slate-400';
            document.getElementById('btn-manage').className = (v==='manage')?'flex flex-col items-center gap-1 p-3 active-tab':'flex flex-col items-center gap-1 p-3 text-slate-400';
        }

        function toggleManageSection(sec) {
            document.getElementById('sec-orders').classList.toggle('hidden', sec !== 'orders');
            document.getElementById('sec-stock').classList.toggle('hidden', sec !== 'stock');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
