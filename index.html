<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TapMS | Cloud POS</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9402/9402314.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .active-tab { color: #2563eb; background: #eff6ff; border-radius: 20px; }
        .product-image { object-fit: cover; width: 100%; height: 100%; border-radius: 1.2rem; }
        
        /* Fixed bottom nav - No Lift Style */
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
        
        /* PC vs Mobile Main Content */
        main { padding-bottom: 140px; }
        @media (min-width: 1024px) {
            #view-cashier { grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 0.75rem; }
            main { padding-bottom: 20px; }
            .nav-bottom { position: static; padding: 0; border: none; background: transparent; }
        }

        /* Summary Overlay */
        #summary-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        #summary-overlay.active { display: flex; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tag-active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="summary-overlay">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center shadow-2xl scale-95 transition-transform duration-300">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="check" class="w-8 h-8"></i>
            </div>
            <h2 class="font-black text-xl mb-1">Order Complete</h2>
            <p id="sum-id" class="text-slate-400 font-bold text-xs mb-6 tracking-widest uppercase">#000</p>
            <div class="bg-slate-50 rounded-[2rem] py-8 mb-8 border border-slate-100">
                <p class="text-[9px] font-black uppercase text-slate-400 mb-1">Total Amount</p>
                <h3 id="sum-total" class="text-4xl font-black text-blue-600">$0.00</h3>
            </div>
            <button onclick="closeSummary()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black uppercase text-[10px] tracking-[0.2em] shadow-lg active:scale-95 transition-all">New Order</button>
        </div>
    </div>

    <nav class="glass border-b border-slate-200 px-6 py-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
            <h1 class="font-extrabold text-xl tracking-tight select-none cursor-pointer active:opacity-50 transition-opacity" 
                onclick="triggerReset()">TapMS</h1>
        </div>
        <div class="flex items-center gap-2">
             <button onclick="toggleSearch()" class="p-2.5 bg-slate-100 rounded-2xl"><i data-lucide="search" class="w-5 h-5 text-slate-500"></i></button>
             <button onclick="checkoutToQueue()" class="bg-blue-600 p-2.5 rounded-2xl shadow-lg active:scale-90 transition-all">
                <i data-lucide="send" class="w-5 h-5 text-white"></i>
             </button>
        </div>
    </nav>

    <div id="category-bar" class="glass border-b border-slate-200 px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar"></div>

    <main class="flex-1 overflow-y-auto p-4 md:p-6">
        <div id="view-cashier" class="grid grid-cols-2 gap-3"></div>
        
        <div id="view-manage" class="hidden max-w-4xl mx-auto space-y-6">
            <div class="flex bg-slate-200/50 p-1 rounded-2xl w-fit mx-auto">
                <button id="sub-btn-orders" onclick="toggleManageSection('orders')" class="px-8 py-2.5 rounded-xl text-[10px] font-black uppercase bg-white text-blue-600 shadow-sm transition-all">Orders</button>
                <button id="sub-btn-stock" onclick="toggleManageSection('stock')" class="px-8 py-2.5 rounded-xl text-[10px] font-black uppercase text-slate-500 transition-all">Stock</button>
            </div>

            <div id="sec-orders" class="space-y-4">
                <div id="pending-list" class="space-y-4"></div>
                <div id="history-list" class="pt-8 border-t border-slate-200 space-y-3"></div>
            </div>

            <div id="sec-stock" class="hidden space-y-6">
                <div class="flex justify-between items-center px-2">
                    <div>
                        <h2 class="font-black text-2xl tracking-tight">Stock Management</h2>
                        <div class="flex gap-2 mt-2">
                            <button onclick="toggleSummarySetting()" id="summary-toggle-ui" class="flex items-center gap-2 bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm active:scale-95 transition-all">
                                <div id="toggle-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                                <span class="text-[9px] font-black uppercase text-slate-500">Summary: OFF</span>
                            </button>
                        </div>
                    </div>
                    <button onclick="addItem()" class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">+ Add Item</button>
                </div>
                <div id="inventory-list" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <nav class="nav-bottom glass border-t border-slate-200 px-10 py-4 flex justify-around">
        <button id="btn-cashier" onclick="showView('cashier')" class="flex flex-col items-center gap-1 active-tab p-2 transition-all">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">Cashier</span>
        </button>
        <button id="btn-manage" onclick="showView('manage')" class="flex flex-col items-center gap-1 text-slate-400 p-2 transition-all">
            <i data-lucide="shield-check" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">Admin</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
